<!DOCTYPE html>
<html>
  <head>
    <style>
      .main-container {
      width: 100%;
      max-width: 800px;    
      margin: 0 auto;       
      background: #ffffff;
      padding: 30px;
      border-radius: 8px;
      }
    .video-wrapper {
      width: 100%;
      border-radius: 6px;
      overflow: hidden;   
      background-color: #000000;
    }

    video {
      display: block;
      width: 100%;         
      height: auto;
    }
  </style>
</head>
  <body>
    <main class="main-container">
    <h1>Here's Your Gift </h1>
     <div class="video-wrapper">
      <!-- Add a thumbnail for your video-->

      <video controls poster="your-thumbnail.jpg">
        <!-- REPLACE "your-video.mp4" with your vid file -->
        <source src="your-video.mp4" type="video/mp4">
  
      </video>
    </div>
</main>
 
  
  </body>
</html>
